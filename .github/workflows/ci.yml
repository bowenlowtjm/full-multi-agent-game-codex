name: CI (Tests)

# Runs Unity EditMode + PlayMode tests on every PR, main branch push, and on demand.
# PRs to main must be green to merge.
#
# Required secrets (repo Settings > Secrets > Actions):
#   UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD
#
# Optional secrets:
#   UNITY_VERSION - override Unity version (default: from ProjectVersion.txt)
#   DISCORD_WEBHOOK_URL - post CI result updates to Discord (#hermes-updates)

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      testMode:
        description: 'Test mode to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - editmode
          - playmode
      coverage:
        description: 'Generate coverage report'
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  UNITY_VERSION: ${{ vars.UNITY_VERSION || '6000.4.10f1' }}
  PROJECT_PATH: .

jobs:
  # Job 1: EditMode Tests (includes compilation gate)
  test-editmode:
    name: EditMode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-editmode-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-editmode-${{ env.UNITY_VERSION }}-
            Library-editmode-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: test-results/editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode Test Results
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+Pully.Game'

      - name: Upload EditMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-editmode
          path: test-results/editmode

  # Job 2: PlayMode Tests
  test-playmode:
    name: PlayMode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-playmode-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-playmode-${{ env.UNITY_VERSION }}-
            Library-playmode-

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: test-results/playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: PlayMode Test Results
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+Pully.Game'

      - name: Upload PlayMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-playmode
          path: test-results/playmode

  # Job 4: Combined Coverage Report
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-editmode, test-playmode]
    if: always() && (needs.test-editmode.result == 'success' || needs.test-playmode.result == 'success')
    steps:
      - name: Download EditMode Results
        uses: actions/download-artifact@v4
        with:
          name: test-results-editmode
          path: test-results/editmode

      - name: Download PlayMode Results
        uses: actions/download-artifact@v4
        with:
          name: test-results-playmode
          path: test-results/playmode

      - name: Upload Combined Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-all
          path: test-results/

      - name: Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| EditMode | ${{ needs.test-editmode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PlayMode | ${{ needs.test-playmode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Unity Version: ${{ env.UNITY_VERSION }}" >> $GITHUB_STEP_SUMMARY

  # Job 5: Test Summary (fails if any test job failed)
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-editmode, test-playmode]
    if: always()
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - name: Evaluate CI status
        id: eval
        run: |
          if [[ "${{ needs.test-editmode.result }}" == "failure" ]] || [[ "${{ needs.test-playmode.result }}" == "failure" ]]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "::error::Tests failed! Check individual job logs."
            exit 1
          elif [[ "${{ needs.test-editmode.result }}" == "cancelled" ]] || [[ "${{ needs.test-playmode.result }}" == "cancelled" ]]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
            echo "CI checks were cancelled."
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "All tests passed!"
          fi

  # Job 6: Discord notification for tracked agent updates channel
  discord-notify:
    name: Discord Notify
    runs-on: ubuntu-latest
    needs: [test-editmode, test-playmode, test-summary]
    if: always()
    steps:
      - name: Post CI status to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          EDITMODE_RESULT: ${{ needs.test-editmode.result }}
          PLAYMODE_RESULT: ${{ needs.test-playmode.result }}
          SUMMARY_RESULT: ${{ needs.test-summary.outputs.status }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi

          if ! echo "$WEBHOOK" | grep -Eq '^https://(discord|ptb\.discord|canary\.discord)\.com/api/webhooks/[0-9]+/[^[:space:]]+$'; then
            echo "::error::DISCORD_WEBHOOK_URL does not look like a valid Discord webhook URL."
            exit 1
          fi

          STATUS="${SUMMARY_RESULT:-failure}"
          case "$STATUS" in
            success)
              COLOR=5763719
              ICON="✅"
              ;;
            cancelled)
              COLOR=9807270
              ICON="⚪"
              ;;
            *)
              COLOR=15548997
              ICON="❌"
              ;;
          esac

          SHORT_SHA="${COMMIT::7}"

          cat > /tmp/discord-payload.json <<JSON
          {
            "embeds": [
              {
                "title": "${ICON} CI (Tests): ${STATUS}",
                "color": ${COLOR},
                "fields": [
                  {"name": "Repository", "value": "${REPO}", "inline": true},
                  {"name": "Branch", "value": "${BRANCH}", "inline": true},
                  {"name": "Commit", "value": "${SHORT_SHA}", "inline": true},
                  {"name": "EditMode", "value": "${EDITMODE_RESULT}", "inline": true},
                  {"name": "PlayMode", "value": "${PLAYMODE_RESULT}", "inline": true},
                  {"name": "Actor", "value": "${ACTOR}", "inline": true},
                  {"name": "Run", "value": "[View workflow run](${RUN_URL})", "inline": false}
                ],
                "footer": {"text": "Workflow #${RUN_NUMBER}"}
              }
            ]
          }
          JSON

          HTTP_CODE=$(curl -sS -o /tmp/discord-response.txt -w "%{http_code}" -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            --data @/tmp/discord-payload.json)

          echo "Discord webhook HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord webhook post failed with HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/discord-response.txt || true
            exit 1
          fi
